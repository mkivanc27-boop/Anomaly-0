name: Build Anomaly Mod
on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Build with Gradle
        # gradlew dosyası olmasa bile sistemi çalıştıracak komut
        run: |
          if [ -f gradlew ]; then
            chmod +x gradlew
            ./gradlew build
          else
            gradle build
          fi

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Anomaly-Mod-Jar
          path: build/libs/*.jar
          
